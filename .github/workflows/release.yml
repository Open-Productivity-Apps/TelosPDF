# Release: on tag push (v*), build signed desktop bundles and publish them to
# the GitHub release for that tag — Windows MSI + Linux deb/rpm/AppImage —
# plus signed updater artifacts and latest.json for the in-app updater.
# The macOS build is a single signed & notarized UNIVERSAL dmg (Intel +
# Apple Silicon) produced and uploaded from the release machine.
name: Release

on:
  push:
    tags: ["v*"]

jobs:
  desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --bundles msi
          - os: ubuntu-22.04
            args: --bundles deb,rpm,appimage
    runs-on: ${{ matrix.os }}
    # codesign/notarization can wedge on hosted runners — fail fast instead
    # of burning the 6-hour default.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - name: Linux system deps (Tauri v2)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev libxdo-dev libssl-dev

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - run: pnpm install --frozen-lockfile

      - name: Fetch pinned PDFium (host platform)
        run: cargo xtask fetch-pdfium

      # Self-contained Tesseract shipped inside the bundle (Linux only here;
      # the macOS universal build bundles it on the release machine).
      - name: Bundle OCR engine (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y tesseract-ocr patchelf
          ./scripts/bundle-ocr.sh

      # Windows has no bundled Tesseract yet — the app falls back to a system
      # install. The placeholder keeps the `../.ocr` resource mapping valid.
      - name: Stage OCR resource dir (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force .ocr | Out-Null
          Set-Content .ocr/README.txt "TelosPDF uses a system Tesseract install on Windows (winget install tesseract-ocr.tesseract)."

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater artifact signing (minisign); latest.json is generated
          # and merged across matrix jobs by tauri-action.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "TelosPDF ${{ github.ref_name }}"
          releaseBody: |
            ## Which file do I download?

            | Your system | Download |
            |---|---|
            | macOS — Intel & Apple Silicon (one universal app) | the `.dmg` |
            | Windows 10/11 (64-bit) | the `.msi` |
            | Linux — Debian / Ubuntu | the `.deb` |
            | Linux — Fedora / openSUSE | the `.rpm` |
            | Linux — any distribution | the `.AppImage` |

            The `.tar.gz`, `.sig`, and `latest.json` files power the in-app
            updater — you don't need to download them.
          releaseDraft: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
