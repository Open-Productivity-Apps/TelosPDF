<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>TelosPDF</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: transparent;
        color: #e6e9ee;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        user-select: none;
      }
      /* The window itself is transparent; this container is the visible
         card, with a subtle 10px rounding. */
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        background: #181a1f;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.08);
        box-sizing: border-box;
      }
      .logo {
        width: 72px;
        height: 72px;
        border-radius: 18px;
        background: linear-gradient(180deg, #ef5350, #c62828);
        color: #fff;
        font-size: 40px;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
      }
      h1 {
        font-size: 20px;
        font-weight: 650;
        margin: 4px 0 0;
      }
      .tag {
        font-size: 12px;
        color: #8b9098;
        margin-bottom: 10px;
      }
      .bar {
        width: 240px;
        height: 6px;
        border-radius: 3px;
        background: rgba(255, 255, 255, 0.1);
        overflow: hidden;
      }
      .fill {
        height: 100%;
        width: 0%;
        border-radius: 3px;
        background: #4c8df6;
        transition: width 0.12s linear;
      }
      .pct {
        font-size: 11px;
        color: #8b9098;
        font-variant-numeric: tabular-nums;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo"><svg width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></svg></div>
      <h1>TelosPDF</h1>
      <div class="tag">Open-source PDF workstation</div>
      <div class="bar"><div class="fill" id="fill"></div></div>
      <div class="pct" id="pct">0%</div>
    </div>
    <script>
      // Eases toward 90% while the main window boots; the window is closed
      // by the backend (frontend_ready) which is the real 100%.
      const fill = document.getElementById("fill");
      const pct = document.getElementById("pct");
      let p = 0;
      const timer = setInterval(() => {
        const target = 92;
        p = Math.min(target, p + Math.max(0.6, (target - p) * 0.08));
        fill.style.width = p.toFixed(0) + "%";
        pct.textContent = fill.style.width;
        if (p >= target) clearInterval(timer);
      }, 50);
    </script>
  </body>
</html>
